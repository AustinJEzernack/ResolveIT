<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ResolveIT - Public Ticket Intake</title>
    <style>
      :root {
        --bg: #0f1216;
        --panel: #171c22;
        --panel-2: #1c232b;
        --text: #edf2f7;
        --muted: #a0aec0;
        --line: #2d3748;
        --accent: #e03131;
        --accent-hover: #c92a2a;
        --ok-bg: rgba(56, 161, 105, 0.15);
        --ok-line: rgba(56, 161, 105, 0.4);
        --ok-text: #9ae6b4;
        --err-bg: rgba(229, 62, 62, 0.15);
        --err-line: rgba(229, 62, 62, 0.45);
        --err-text: #feb2b2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", sans-serif;
        background:
          radial-gradient(1100px 700px at 100% -20%, #2d1212 0%, transparent 55%),
          radial-gradient(900px 560px at -20% 120%, #111c2b 0%, transparent 50%),
          var(--bg);
        color: var(--text);
      }

      .wrap {
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
        padding: 36px 18px;
      }

      .brand {
        margin-bottom: 14px;
        font-size: 15px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .title {
        margin: 0;
        font-size: clamp(26px, 3.2vw, 38px);
        line-height: 1.1;
      }

      .subtitle {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .card {
        margin-top: 26px;
        background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 22px;
        box-shadow: 0 10px 36px rgba(0, 0, 0, 0.3);
      }

      .status {
        margin: 0 0 16px;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 14px;
      }

      .status.ok {
        background: var(--ok-bg);
        border: 1px solid var(--ok-line);
        color: var(--ok-text);
      }

      .status.err {
        background: var(--err-bg);
        border: 1px solid var(--err-line);
        color: var(--err-text);
      }

      form {
        display: grid;
        gap: 14px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      @media (max-width: 640px) {
        .row {
          grid-template-columns: 1fr;
        }
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #10151b;
        color: var(--text);
        font: inherit;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(224, 49, 49, 0.2);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      .submit {
        margin-top: 6px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px 14px;
        font-weight: 700;
        color: white;
        background: var(--accent);
        cursor: pointer;
      }

      .submit:hover {
        background: var(--accent-hover);
      }

      .submit:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .foot {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="brand">ResolveIT</div>
      <h1 class="title">Public Ticket Intake</h1>
      {% if workshop %}
      <p class="subtitle">Submit a support ticket for {{ workshop.name }}.</p>
      {% else %}
      <p class="subtitle">Workshop {{ workshop_slug }} is unavailable.</p>
      {% endif %}

      <section class="card">
        <div id="status"></div>

        {% if error_message %}
        <p class="status err">{{ error_message }}</p>
        {% endif %}

        {% if workshop %}
        <form id="intake-form" novalidate>
          <div>
            <label for="title">Title</label>
            <input id="title" name="title" required maxlength="200" />
          </div>

          <div>
            <label for="description">Description</label>
            <textarea id="description" name="description" required></textarea>
          </div>

          <div class="row">
            <div>
              <label for="submitter_name">Your Name</label>
              <input id="submitter_name" name="submitter_name" required maxlength="100" />
            </div>
            <div>
              <label for="submitter_email">Your Email</label>
              <input id="submitter_email" name="submitter_email" type="email" required />
            </div>
          </div>

          <button id="submit-btn" class="submit" type="submit">Submit Ticket</button>
        </form>
        {% endif %}

        <div class="foot">Powered by ResolveIT</div>
      </section>
    </main>

    <script>
      (function () {
        var form = document.getElementById('intake-form');
        if (!form) return;

        var statusEl = document.getElementById('status');
        var submitBtn = document.getElementById('submit-btn');

        function showStatus(type, message) {
          statusEl.innerHTML = '<p class="status ' + type + '">' + message + '</p>';
        }

        form.addEventListener('submit', async function (event) {
          event.preventDefault();
          if (!form.reportValidity()) return;

          submitBtn.disabled = true;
          showStatus('ok', 'Submitting ticket...');

          var data = {
            title: form.title.value.trim(),
            description: form.description.value.trim(),
            submitter_name: form.submitter_name.value.trim(),
            submitter_email: form.submitter_email.value.trim(),
          };

          try {
            var response = await fetch(window.location.pathname, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
              },
              body: JSON.stringify(data)
            });

            var payload = await response.json();
            if (!response.ok) {
              var msg = payload && payload.message ? payload.message : 'Unable to submit ticket.';
              showStatus('err', msg);
              return;
            }

            var ticketId = payload && payload.data && payload.data.ticket_id ? payload.data.ticket_id : '';
            showStatus('ok', 'Ticket submitted successfully' + (ticketId ? '. Ticket ID: ' + ticketId : '.') );
            form.reset();
          } catch (error) {
            showStatus('err', 'Network error. Please try again.');
          } finally {
            submitBtn.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
